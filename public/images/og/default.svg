<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFBEB"/>
      <stop offset="100%" style="stop-color:#FEF3C7"/>
    </linearGradient>
    <linearGradient id="hexGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F59E0B"/>
      <stop offset="100%" style="stop-color:#D97706"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#F59E0B"/>
      <stop offset="100%" style="stop-color:#EAB308"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Subtle pattern - honeycomb -->
  <g opacity="0.08">
    <path d="M50 100 L80 85 L110 100 L110 130 L80 145 L50 130 Z" fill="#D97706"/>
    <path d="M110 100 L140 85 L170 100 L170 130 L140 145 L110 130 Z" fill="#D97706"/>
    <path d="M80 145 L110 130 L140 145 L140 175 L110 190 L80 175 Z" fill="#D97706"/>
    <path d="M1050 480 L1080 465 L1110 480 L1110 510 L1080 525 L1050 510 Z" fill="#D97706"/>
    <path d="M1080 525 L1110 510 L1140 525 L1140 555 L1110 570 L1080 555 Z" fill="#D97706"/>
    <path d="M1110 480 L1140 465 L1170 480 L1170 510 L1140 525 L1110 510 Z" fill="#D97706"/>
  </g>

  <!-- Main content area -->
  <g transform="translate(600, 315)">
    <!-- Hexagon logo -->
    <g transform="translate(0, -80)">
      <path d="M0 -70 L60 -35 L60 35 L0 70 L-60 35 L-60 -35 Z" fill="url(#hexGrad)"/>
      <path d="M0 -55 L48 -28 L48 28 L0 55 L-48 28 L-48 -28 Z" fill="none" stroke="#FEF3C7" stroke-width="2" opacity="0.6"/>
      <!-- R letter -->
      <path d="M-20 -25 L-20 25 M-20 -25 L5 -25 C18 -25 28 -15 28 -5 C28 5 18 15 5 15 L-20 15 M5 15 L28 25"
            fill="none" stroke="#FEF3C7" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
    </g>

    <!-- Brand name -->
    <text x="0" y="60" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="72" font-weight="700" text-anchor="middle">
      <tspan fill="#F59E0B">Reward</tspan><tspan fill="#1F2937">Hive</tspan>
    </text>

    <!-- Tagline -->
    <text x="0" y="120" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="28" font-weight="400" fill="#6B7280" text-anchor="middle">
      Curated Products &amp; Verified Deals
    </text>
  </g>

  <!-- Bottom accent bar -->
  <rect x="0" y="610" width="1200" height="20" fill="url(#accentGrad)"/>

  <!-- URL in corner -->
  <text x="60" y="580" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="20" font-weight="500" fill="#9CA3AF">
    rewardhive.store
  </text>
</svg>
