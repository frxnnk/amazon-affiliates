<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="hiveGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F59E0B"/>
      <stop offset="100%" style="stop-color:#D97706"/>
    </linearGradient>
    <linearGradient id="hiveGradDark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FBBF24"/>
      <stop offset="100%" style="stop-color:#F59E0B"/>
    </linearGradient>
  </defs>
  <!-- Hexagon (Hive) -->
  <path d="M64 8 L112 36 L112 92 L64 120 L16 92 L16 36 Z" fill="url(#hiveGrad)" class="hex"/>
  <!-- Inner hexagon -->
  <path d="M64 20 L100 42 L100 86 L64 108 L28 86 L28 42 Z" fill="none" stroke="#FEF3C7" stroke-width="2" opacity="0.5"/>
  <!-- R letter stylized as reward/gift -->
  <path d="M48 45 L48 83 M48 45 L70 45 C78 45 84 51 84 59 C84 67 78 73 70 73 L48 73 M70 73 L84 83" 
        fill="none" stroke="#FEF3C7" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Small honey drops -->
  <circle cx="38" cy="95" r="4" fill="#FEF3C7" opacity="0.6"/>
  <circle cx="90" cy="95" r="3" fill="#FEF3C7" opacity="0.4"/>
  <style>
    @media (prefers-color-scheme: dark) {
      .hex { fill: url(#hiveGradDark); }
    }
  </style>
</svg>
